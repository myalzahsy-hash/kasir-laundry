<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laundry Checklist - Telegram POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' } }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased min-h-screen pb-36 md:pb-10">

    <header class="bg-white shadow-sm sticky top-0 z-40 border-b border-slate-200">
        <div class="max-w-3xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-brand-100 text-brand-600 rounded-xl flex items-center justify-center text-xl shadow-inner">
                    <i class="fa-brands fa-telegram"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight text-slate-800" id="titleBar">Checklist POS</h1>
                    <p class="text-[11px] text-slate-500 font-medium">Telegram Mini App</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto mt-6 px-4 sm:px-6 space-y-6">
        <!-- Input ID Tersembunyi untuk mode Edit -->
        <input type="hidden" id="editId" value="">

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-6">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                <i class="fa-solid fa-file-invoice"></i> Data Transaksi
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-600">Outlet</label>
                    <select id="outlet" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 outline-none">
                        <option>DayWash Laundry</option>
                        <option>Zelia Laundry</option>
                    </select>
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-600">Tanggal Nota</label>
                    <input type="date" id="trxDate" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 outline-none">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-600">Nama Pelanggan</label>
                    <input type="text" id="customer" placeholder="Contoh: Budi Santoso" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 outline-none">
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-600">No. Nota (Opsional)</label>
                    <input type="text" id="transaction" placeholder="Kosongkan agar otomatis" class="w-full bg-slate-50 border border-slate-200 text-slate-800 rounded-xl px-4 py-3 uppercase outline-none">
                </div>
            </div>
        </section>

        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-6">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 flex items-center gap-2">
                <i class="fa-solid fa-tags"></i> Rincian Barang
            </h2>
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- Pakaian -->
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 flex flex-col items-center gap-3">
                    <span class="font-semibold text-slate-700">Pakaian</span>
                    <div class="flex items-center justify-between w-full bg-white rounded-lg p-1 border border-slate-200 shadow-sm">
                        <button onclick="minus('clothes')" class="w-10 h-10 rounded-md bg-rose-50 text-rose-600 font-bold text-xl">−</button>
                        <span id="clothesValue" class="text-2xl font-bold text-slate-800 w-12 text-center">0</span>
                        <button onclick="plus('clothes')" class="w-10 h-10 rounded-md bg-emerald-50 text-emerald-600 font-bold text-xl">+</button>
                        <input type="hidden" id="clothes" value="0">
                    </div>
                </div>
                <!-- BH -->
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 flex flex-col items-center gap-3">
                    <span class="font-semibold text-slate-700">BH / Bra</span>
                    <div class="flex items-center justify-between w-full bg-white rounded-lg p-1 border border-slate-200 shadow-sm">
                        <button onclick="minus('bra')" class="w-10 h-10 rounded-md bg-rose-50 text-rose-600 font-bold text-xl">−</button>
                        <span id="braValue" class="text-2xl font-bold text-slate-800 w-12 text-center">0</span>
                        <button onclick="plus('bra')" class="w-10 h-10 rounded-md bg-emerald-50 text-emerald-600 font-bold text-xl">+</button>
                        <input type="hidden" id="bra" value="0">
                    </div>
                </div>
                <!-- CD -->
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 flex flex-col items-center gap-3">
                    <span class="font-semibold text-slate-700">Celana Dalam</span>
                    <div class="flex items-center justify-between w-full bg-white rounded-lg p-1 border border-slate-200 shadow-sm">
                        <button onclick="minus('underwear')" class="w-10 h-10 rounded-md bg-rose-50 text-rose-600 font-bold text-xl">−</button>
                        <span id="underwearValue" class="text-2xl font-bold text-slate-800 w-12 text-center">0</span>
                        <button onclick="plus('underwear')" class="w-10 h-10 rounded-md bg-emerald-50 text-emerald-600 font-bold text-xl">+</button>
                        <input type="hidden" id="underwear" value="0">
                    </div>
                </div>
                <!-- Kaos Kaki -->
                <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 flex flex-col items-center gap-3">
                    <span class="font-semibold text-slate-700">Kaos Kaki</span>
                    <div class="flex items-center justify-between w-full bg-white rounded-lg p-1 border border-slate-200 shadow-sm">
                        <button onclick="minus('socks')" class="w-10 h-10 rounded-md bg-rose-50 text-rose-600 font-bold text-xl">−</button>
                        <span id="socksValue" class="text-2xl font-bold text-slate-800 w-12 text-center">0</span>
                        <button onclick="plus('socks')" class="w-10 h-10 rounded-md bg-emerald-50 text-emerald-600 font-bold text-xl">+</button>
                        <input type="hidden" id="socks" value="0">
                    </div>
                </div>
            </div>
            
            <div class="mt-6 border-t border-slate-100 pt-6">
                <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Lainnya (Opsional)</h3>
                <div class="space-y-3">
                    <div class="flex gap-2">
                        <input type="text" id="otherName1" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm">
                        <input type="number" id="otherQty1" min="0" class="w-20 text-center bg-slate-50 border border-slate-200 rounded-xl px-2 py-3 text-lg font-bold">
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="otherName2" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm">
                        <input type="number" id="otherQty2" min="0" class="w-20 text-center bg-slate-50 border border-slate-200 rounded-xl px-2 py-3 text-lg font-bold">
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="otherName3" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm">
                        <input type="number" id="otherQty3" min="0" class="w-20 text-center bg-slate-50 border border-slate-200 rounded-xl px-2 py-3 text-lg font-bold">
                    </div>
                </div>
            </div>
        </section>

        <!-- AREA TOMBOL DIPERBARUI -->
        <section class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 z-50">
            <div class="max-w-3xl mx-auto">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-bold text-slate-500">Total Item: <span class="text-brand-600 text-lg" id="totalMobile">0</span></span>
                    <button onclick="kirimBlanko()" class="text-xs font-bold bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg border border-slate-200">
                        <i class="fa-solid fa-receipt"></i> Cetak Blanko
                    </button>
                </div>
                <div class="flex gap-2">
                    <!-- Tombol 1: Simpan Saja -->
                    <button onclick="kirimData('save_only')" class="flex-1 bg-white hover:bg-slate-50 text-brand-600 border-2 border-brand-500 font-bold px-2 py-3.5 rounded-xl transition-all active:scale-95 text-sm sm:text-base">
                        <i class="fa-solid fa-save"></i> SIMPAN SAJA
                    </button>
                    <!-- Tombol 2: Simpan & Print -->
                    <button onclick="kirimData('save_print')" class="flex-[1.5] bg-brand-600 hover:bg-brand-700 text-white shadow-lg shadow-brand-500/30 font-bold px-2 py-3.5 rounded-xl transition-all active:scale-95 text-sm sm:text-base">
                        <i class="fa-solid fa-print"></i> SIMPAN & PRINT
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // perbaikan: deteksi data lewat URL query string (parameter ?edit=...) dan fallback ke hash (#edit=...)
        window.onload = function() {
            document.getElementById("trxDate").value = new Date().toISOString().split("T")[0];
            
            const urlParams = new URLSearchParams(window.location.search);
            let b64 = urlParams.get('edit');
            
            // Fallback jika b64 kosong (misal lewat rute hash lama)
            if (!b64) {
                const hash = window.location.hash.substring(1);
                if (hash.startsWith('edit=')) {
                    b64 = hash.split('edit=')[1];
                }
            }
            
            if (b64) {
                try {
                    // Penanganan kasus jika karakter + diubah jadi spasi oleh browser
                    b64 = b64.replace(/\s/g, '+');
                    const decodedStr = atob(b64);
                    // Decode utf-8 safely
                    const data = JSON.parse(decodeURIComponent(escape(decodedStr)));
                    
                    document.getElementById('titleBar').innerText = "Edit Checklist POS";
                    document.getElementById('editId').value = data.id;
                    document.getElementById('outlet').value = data.outlet;
                    document.getElementById('trxDate').value = data.trxDate;
                    document.getElementById('customer').value = data.customer;
                    document.getElementById('transaction').value = data.transaction;
                    
                    // Set item quantities
                    ['clothes', 'bra', 'underwear', 'socks'].forEach(item => {
                        const val = data[item] || 0;
                        document.getElementById(item).value = val;
                        document.getElementById(item + 'Value').innerText = val;
                    });
                    
                    // Set others
                    if (data.others && data.others.length > 0) {
                        data.others.forEach((item, index) => {
                            if (index < 3) {
                                document.getElementById('otherName' + (index+1)).value = item.name || '';
                                document.getElementById('otherQty' + (index+1)).value = item.qty || '';
                            }
                        });
                    }
                    updateTotal();
                } catch(e) { 
                    console.error("Gagal parse data edit", e); 
                }
            }
        };

        function updateTotal() {
            const total = 
                Number(document.getElementById("clothes").value) + Number(document.getElementById("bra").value) +
                Number(document.getElementById("underwear").value) + Number(document.getElementById("socks").value) +
                (Number(document.getElementById("otherQty1").value) || 0) + (Number(document.getElementById("otherQty2").value) || 0) +
                (Number(document.getElementById("otherQty3").value) || 0);

            document.getElementById("totalMobile").innerText = total;
            return total;
        }

        ["otherQty1", "otherQty2", "otherQty3"].forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener("input", updateTotal);
            el.addEventListener("blur", function(){
                if (Number(this.value) < 0 || this.value === "") this.value = "";
                updateTotal();
            });
        });

        function plus(id) {
            const input = document.getElementById(id);
            input.value = Number(input.value) + 1;
            document.getElementById(id + "Value").innerText = input.value;
            updateTotal();
        }

        function minus(id) {
            const input = document.getElementById(id);
            if (Number(input.value) > 0) {
                input.value = Number(input.value) - 1;
                document.getElementById(id + "Value").innerText = input.value;
                updateTotal();
            }
        }

        function extractData(action, isBlank = false) {
            let others = [];
            for (let i = 1; i <= 3; i++) {
                let name = document.getElementById("otherName" + i).value;
                let qty = document.getElementById("otherQty" + i).value;
                if (name.trim() !== "" && Number(qty) > 0) {
                    others.push({ name: name, qty: Number(qty) });
                }
            }
            return {
                action: action,  // 'save_only' atau 'save_print'
                id: document.getElementById("editId").value, // Mengirim ID jika sedang mode edit
                isBlank: isBlank,
                outlet: document.getElementById("outlet").value,
                trxDate: document.getElementById("trxDate").value,
                customer: document.getElementById("customer").value,
                transaction: document.getElementById("transaction").value,
                clothes: Number(document.getElementById("clothes").value),
                bra: Number(document.getElementById("bra").value),
                underwear: Number(document.getElementById("underwear").value),
                socks: Number(document.getElementById("socks").value),
                others: others,
                total: updateTotal()
            };
        }

        function kirimData(action) {
            const data = extractData(action, false);
            if (!data.customer) { tg.showAlert("Nama pelanggan wajib diisi!"); return; }
            if (data.total === 0) { tg.showAlert("Minimal ada 1 item yang diinput!"); return; }
            tg.sendData(JSON.stringify(data));
        }

        function kirimBlanko() {
            const data = extractData('save_print', true);
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
