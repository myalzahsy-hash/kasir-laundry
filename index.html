<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Input Struk Laundry</title>
    <!-- Script Wajib Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #6C5CE7;
            --primary-hover: #5a4bcf;
            --bg: #F4F4F9;
            --text: #2D3436;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        
        .card {
            background: white; border-radius: 16px; padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: var(--primary); margin: 0; font-size: 22px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: 600; }
        .form-group input {
            width: 100%; padding: 12px; border: 1px solid #E0E0E0; 
            border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--primary); }

        .item-list { border-top: 2px dashed #EEE; padding-top: 15px; }
        .item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #F5F5F5;
        }
        .item-name { font-size: 16px; font-weight: 500; }
        
        .counter { display: flex; align-items: center; gap: 15px; }
        .btn-count {
            background: var(--bg); color: var(--text); border: none;
            width: 35px; height: 35px; border-radius: 8px; font-size: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .btn-count:active { background: #DFDFDF; }
        .qty-val { font-size: 18px; font-weight: bold; min-width: 20px; text-align: center; }

        .total-box {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(108, 92, 231, 0.1); padding: 15px; border-radius: 12px;
            margin-top: 15px; color: var(--primary); font-weight: bold; font-size: 18px;
        }

        .btn-submit {
            background: var(--primary); color: white; width: 100%; padding: 16px;
            border: none; border-radius: 12px; font-size: 16px; font-weight: bold;
            margin-top: 20px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }
        .btn-submit:active { background: var(--primary-hover); transform: translateY(2px); }
        .error-msg { color: #d63031; font-size: 13px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h2>Laundry Kasir</h2>
        </div>
        
        <div class="form-group">
            <label>Nama Pelanggan</label>
            <input type="text" id="nama" placeholder="Masukkan nama...">
            <div id="err-nama" class="error-msg">Nama tidak boleh kosong!</div>
        </div>
        
        <div class="form-group">
            <label>No. Nota</label>
            <input type="text" id="nota" placeholder="Contoh: INV-001">
            <div id="err-nota" class="error-msg">No. Nota tidak boleh kosong!</div>
        </div>

        <div class="item-list">
            <label style="font-weight: 600; display:block; margin-bottom:10px;">Item Laundry</label>
            
            <div class="item-row" data-item="pakaian">
                <span class="item-name">Pakaian</span>
                <div class="counter">
                    <button class="btn-count" onclick="updateQty('pakaian', -1)">-</button>
                    <span class="qty-val" id="qty-pakaian">0</span>
                    <button class="btn-count" onclick="updateQty('pakaian', 1)">+</button>
                </div>
            </div>
            <div class="item-row" data-item="celana">
                <span class="item-name">Celana</span>
                <div class="counter">
                    <button class="btn-count" onclick="updateQty('celana', -1)">-</button>
                    <span class="qty-val" id="qty-celana">0</span>
                    <button class="btn-count" onclick="updateQty('celana', 1)">+</button>
                </div>
            </div>
            <div class="item-row" data-item="bh">
                <span class="item-name">BH</span>
                <div class="counter">
                    <button class="btn-count" onclick="updateQty('bh', -1)">-</button>
                    <span class="qty-val" id="qty-bh">0</span>
                    <button class="btn-count" onclick="updateQty('bh', 1)">+</button>
                </div>
            </div>
            <div class="item-row" data-item="kaos_kaki">
                <span class="item-name">Kaos Kaki</span>
                <div class="counter">
                    <button class="btn-count" onclick="updateQty('kaos_kaki', -1)">-</button>
                    <span class="qty-val" id="qty-kaos_kaki">0</span>
                    <button class="btn-count" onclick="updateQty('kaos_kaki', 1)">+</button>
                </div>
            </div>
            <div class="item-row" data-item="lainnya">
                <span class="item-name">Lainnya</span>
                <div class="counter">
                    <button class="btn-count" onclick="updateQty('lainnya', -1)">-</button>
                    <span class="qty-val" id="qty-lainnya">0</span>
                    <button class="btn-count" onclick="updateQty('lainnya', 1)">+</button>
                </div>
            </div>
        </div>

        <div class="total-box">
            <span>Total Item:</span>
            <span id="total-qty">0 pcs</span>
        </div>

        <button class="btn-submit" onclick="kirimData()">KIRIM KE BOT</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Buat full screen
        
        let items = {
            pakaian: 0,
            celana: 0,
            bh: 0,
            kaos_kaki: 0,
            lainnya: 0
        };

        function updateQty(item, change) {
            let newQty = items[item] + change;
            if (newQty < 0) newQty = 0;
            items[item] = newQty;
            document.getElementById('qty-' + item).innerText = newQty;
            hitungTotal();
        }

        function hitungTotal() {
            let total = 0;
            for (let key in items) {
                total += items[key];
            }
            document.getElementById('total-qty').innerText = total + " pcs";
            return total;
        }

        function kirimData() {
            let nama = document.getElementById('nama').value.trim();
            let nota = document.getElementById('nota').value.trim();
            let total = hitungTotal();
            
            // Validasi
            document.getElementById('err-nama').style.display = nama === '' ? 'block' : 'none';
            document.getElementById('err-nota').style.display = nota === '' ? 'block' : 'none';
            
            if (nama === '' || nota === '') return;
            if (total === 0) {
                tg.showAlert("Tambahkan minimal 1 item laundry!");
                return;
            }

            let data = {
                nama: nama,
                nota: nota,
                items: items,
                total: total
            };

            // Mengirim data balik ke bot dan menutup web app
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
